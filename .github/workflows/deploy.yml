name: Deploy to TestFlight

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: macos-26

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

    - name: Setup production configuration
      env:
        ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
        ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
      run: |
        cp Configurations/Prod.xcconfig.example Configurations/Prod.xcconfig
        sed -i '' "s|ADMOB_APP_ID = .*|ADMOB_APP_ID = $ADMOB_APP_ID|" Configurations/Prod.xcconfig
        sed -i '' "s|ADMOB_INTERSTITIAL_AD_UNIT_ID = .*|ADMOB_INTERSTITIAL_AD_UNIT_ID = $ADMOB_INTERSTITIAL_AD_UNIT_ID|" Configurations/Prod.xcconfig

    - name: Install Apple certificate and provisioning profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

        security create-keychain -p "" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "" $KEYCHAIN_PATH

        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # Provisioning ProfileをUUID付きファイル名でインストール
        PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
        PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

        echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
        echo "PP_NAME=$PP_NAME" >> $GITHUB_ENV

    - name: Setup App Store Connect API Key
      env:
        ASC_SECRET_KEY: ${{ secrets.ASC_SECRET_KEY }}
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      run: |
        mkdir -p ~/private_keys
        echo "$ASC_SECRET_KEY" | base64 --decode > ~/private_keys/AuthKey_$ASC_KEY_ID.p8
        chmod 600 ~/private_keys/AuthKey_$ASC_KEY_ID.p8

        # fastlane用のAPI Key JSONファイルを作成
        KEY_CONTENT=$(awk '{printf "%s\\n", $0}' ~/private_keys/AuthKey_$ASC_KEY_ID.p8)
        cat > ~/private_keys/api_key.json <<EOF
        {
          "key_id": "$ASC_KEY_ID",
          "issuer_id": "$ASC_ISSUER_ID",
          "key": "$KEY_CONTENT",
          "in_house": false
        }
        EOF

    - name: Increment Build Number
      run: |
        # GitHub run numberを使用してビルド番号を設定
        agvtool new-version -all ${{ github.run_number }}

    - name: Archive App
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      run: |
        xcodebuild archive \
          -project ShiroGuessr.xcodeproj \
          -scheme ShiroGuessr \
          -archivePath build/ShiroGuessr.xcarchive \
          -configuration Release \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_$ASC_KEY_ID.p8 \
          -authenticationKeyID $ASC_KEY_ID \
          -authenticationKeyIssuerID $ASC_ISSUER_ID \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          CODE_SIGN_STYLE=Manual \
          PROVISIONING_PROFILE_SPECIFIER="$PP_NAME"

    - name: Export IPA
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      run: |
        # ExportOptions.plistを作成
        cat > ExportOptions.plist <<PLIST
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>W8476NSA2M</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>dev.krgm4d.ShiroGuessr</key>
                <string>$PP_NAME</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
        </dict>
        </plist>
        PLIST

        xcodebuild -exportArchive \
          -archivePath build/ShiroGuessr.xcarchive \
          -exportPath build \
          -exportOptionsPlist ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_$ASC_KEY_ID.p8 \
          -authenticationKeyID $ASC_KEY_ID \
          -authenticationKeyIssuerID $ASC_ISSUER_ID

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Upload to TestFlight
      run: |
        bundle exec fastlane pilot upload \
          --api_key_path ~/private_keys/api_key.json \
          --ipa build/ShiroGuessr.ipa \
          --skip_waiting_for_build_processing

    - name: Cleanup
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
        rm -rf ~/Library/MobileDevice/Provisioning\ Profiles
        rm -rf ~/private_keys
